<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀 March Madness Simulator</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e94560;
            --text-main: #ededed;
            --text-muted: #888;
            --winner-bg: rgba(233, 69, 96, 0.3);
            --border-color: #2a2a4a;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; text-align: center; }
        h1 { margin-bottom: 5px; font-size: 2.5rem; }
        p.subtitle { color: var(--text-muted); margin-bottom: 20px; }
        
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        button { background-color: var(--accent); color: white; border: none; padding: 12px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); transition: transform 0.1s, box-shadow 0.1s; }
        button.secondary { background-color: var(--card-bg); border: 2px solid var(--accent); box-shadow: none; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6); }
        button:active { transform: translateY(1px); }

        .tournament-board { display: flex; justify-content: space-between; width: 100%; min-width: 1200px; overflow-x: auto; padding-bottom: 40px; }
        .side-bracket { display: flex; gap: 15px; width: 40%; }
        .right-side { flex-direction: row-reverse; }
        .center-stage { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 20%; padding: 0 10px; gap: 20px; }
        .round { display: flex; flex-direction: column; justify-content: space-around; width: 160px; gap: 10px; }
        
        .matchup { background-color: var(--card-bg); border-radius: 4px; padding: 6px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 2px; font-size: 0.85rem; }
        .team { display: flex; justify-content: space-between; padding: 4px 6px; border-radius: 3px; }
        .team.winner { background-color: var(--winner-bg); font-weight: bold; color: #fff; }
        .seed { color: var(--text-muted); font-size: 0.75rem; margin-right: 5px; }

        .stage-title { color: var(--accent); font-weight: bold; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: -10px; }
        .champion-box { padding: 20px; background-color: var(--card-bg); border: 2px dashed #ffd700; border-radius: 8px; text-align: center; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        .champion-box h2 { margin: 0 0 10px 0; color: #ffd700; font-size: 1.2rem; }
        .champion-box .team-name { font-size: 1.5rem; font-weight: bold; color: white; }

        /* Modal & Tooltip CSS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: var(--bg-color); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); max-width: 90%; max-height: 90%; overflow: auto; }
        .close-btn { float: right; cursor: pointer; color: var(--text-muted); font-size: 1.5rem; font-weight: bold; }
        table { border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid var(--border-color); padding: 8px; text-align: center; width: 45px;}
        th { background-color: var(--card-bg); color: white; position: sticky; top: 0; left: 0;}
        
        .matrix-cell { position: relative; cursor: help; }
        .matrix-cell .tooltip {
            visibility: hidden; width: 100px; background-color: #0f172a; color: #fff;
            text-align: center; border-radius: 6px; padding: 6px; position: absolute;
            z-index: 1; bottom: 125%; left: 50%; margin-left: -50px;
            opacity: 0; transition: opacity 0.2s; font-size: 0.75rem; pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); border: 1px solid var(--accent);
        }
        .matrix-cell:hover .tooltip { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

    <h1>🏀 The March Moggness Simulator 🏀</h1>
    <p class="subtitle"></p>
    
    <div class="controls">
        <button onclick="fetchAndRenderBracket()">Roll the Dice! 🎲</button>
        <button class="secondary" onclick="openMatrix()">📉 View Live Win-Rate Matrix</button>
    </div>

    <div class="tournament-board">
        <div id="left-half" class="side-bracket"></div>
        <div id="center-stage" class="center-stage"></div>
        <div id="right-half" class="side-bracket right-side"></div>
    </div>

    <div id="matrixModal" class="modal-overlay" onclick="closeMatrix()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeMatrix()">&times;</span>
            <h2 style="margin-top:0;">📊 Seed vs. Seed Historical Win Probabilities</h2>
            <p style="color:var(--text-muted); font-size:0.9rem;">Row = Team Seed. Column = Opponent Seed. Hover over a cell to see total games played.</p>
            <div id="matrix-container">Loading...</div>
        </div>
    </div>

    <script>
        async function fetchAndRenderBracket() {
            const response = await fetch('/api/bracket');
            const data = await response.json();
            renderBracket(data);
        }

        function buildMatchupHTML(t1, t2) {
            return `
                <div class="matchup">
                    <div class="team ${t1.isWinner ? 'winner' : ''}">
                        <span><span class="seed">${t1.seed}</span> ${t1.name}</span>
                    </div>
                    <div class="team ${t2.isWinner ? 'winner' : ''}">
                        <span><span class="seed">${t2.seed}</span> ${t2.name}</span>
                    </div>
                </div>
            `;
        }

        function renderBracket(data) {
            const leftHalf = document.getElementById('left-half');
            const rightHalf = document.getElementById('right-half');
            const centerStage = document.getElementById('center-stage');
            
            leftHalf.innerHTML = ''; rightHalf.innerHTML = ''; centerStage.innerHTML = '';

            for (let r = 0; r < 4; r++) {
                const gamesInRound = data[r];
                const halfIndex = gamesInRound.length / 2;
                const leftCol = document.createElement('div'); leftCol.className = 'round';
                const rightCol = document.createElement('div'); rightCol.className = 'round';

                for (let i = 0; i < gamesInRound.length; i += 2) {
                    const matchHTML = buildMatchupHTML(gamesInRound[i], gamesInRound[i+1]);
                    if (i < halfIndex) leftCol.innerHTML += matchHTML;
                    else rightCol.innerHTML += matchHTML;
                }
                leftHalf.appendChild(leftCol);
                rightHalf.appendChild(rightCol);
            }

            const f4Teams = data[4];
            const champTeams = data[5];
            const winner = data[6][0];

            centerStage.innerHTML = `
                <div class="stage-title">Final Four</div>
                ${buildMatchupHTML(f4Teams[0], f4Teams[1])}
                ${buildMatchupHTML(f4Teams[2], f4Teams[3])}
                <div class="stage-title" style="margin-top:20px;">Championship</div>
                ${buildMatchupHTML(champTeams[0], champTeams[1])}
                <div class="champion-box" style="margin-top:20px;">
                    <h2>🏆 NATIONAL CHAMPION 🏆</h2>
                    <div class="team-name"><span class="seed">${winner.seed}</span> ${winner.name}</div>
                </div>
            `;
        }

        async function openMatrix() {
            document.getElementById('matrixModal').style.display = 'flex';
            if (document.getElementById('matrix-container').innerHTML === 'Loading...') {
                const response = await fetch('/api/matrix');
                const data = await response.json();
                buildMatrixUI(data);
            }
        }

        function closeMatrix() { document.getElementById('matrixModal').style.display = 'none'; }

        function buildMatrixUI(data) {
            const winRates = data.win_rates;
            const counts = data.counts;
            
            let html = '<table><tr><th>Seed</th>';
            for (let i = 1; i <= 16; i++) html += `<th>${i}</th>`;
            html += '</tr>';

            for (let row = 1; row <= 16; row++) {
                html += `<tr><th>${row}</th>`;
                for (let col = 1; col <= 16; col++) {
                    let winVal = winRates[col][row]; 
                    let countVal = counts[col][row] || 0;
                    
                    let displayVal, prob;
                    if (winVal === null || winVal === '-') {
                        displayVal = '-';
                        prob = 0.50 + ((col - row) * 0.03); 
                    } else {
                        prob = Number(winVal);
                        displayVal = (prob * 100).toFixed(1) + '%';
                    }

                    let color = `rgb(42, 42, 74)`;
                    if (prob > 0.5) color = `rgba(46, 204, 113, ${prob})`;
                    if (prob < 0.5) color = `rgba(233, 69, 96, ${1 - prob})`;
                    
                    let tooltipText = countVal === 1 ? '1 Matchup' : `${countVal} Matchups`;

                    html += `<td class="matrix-cell" style="background-color: ${color}; color: ${prob < 0.3 || prob > 0.7 ? 'white' : '#ddd'};">
                        ${displayVal}
                        <span class="tooltip">${tooltipText}</span>
                    </td>`;
                }
                html += '</tr>';
            }
            html += '</table>';
            document.getElementById('matrix-container').innerHTML = html;
        }

        fetchAndRenderBracket();
    </script>
</body>
</html>
