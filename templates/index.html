<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀 March Moggness Simulator</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e94560;
            --text-main: #ededed;
            --text-muted: #888;
            --winner-bg: rgba(233, 69, 96, 0.3);
            --border-color: #2a2a4a;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; text-align: center; }
        h1 { margin-bottom: 5px; font-size: 2.5rem; }
        p.subtitle { color: var(--text-muted); margin-bottom: 20px; }
        
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        button { background-color: var(--accent); color: white; border: none; padding: 12px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); transition: transform 0.1s, box-shadow 0.1s; }
        button.secondary { background-color: var(--card-bg); border: 2px solid var(--accent); box-shadow: none; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6); }

        /* Score Display */
        #score-banner { margin-bottom: 30px; display: none; }
        .score-card { background: var(--card-bg); border: 2px solid var(--accent); padding: 15px 30px; border-radius: 12px; display: inline-flex; align-items: center; }
        .score-value { font-size: 2.5rem; font-weight: bold; color: white; margin: 0 15px; }

        .tournament-board { display: flex; justify-content: space-between; width: 100%; min-width: 1200px; overflow-x: auto; padding-bottom: 40px; }
        .side-bracket { display: flex; gap: 15px; width: 40%; }
        .right-side { flex-direction: row-reverse; }
        .center-stage { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 20%; padding: 0 10px; gap: 20px; }
        .round { display: flex; flex-direction: column; justify-content: space-around; width: 160px; gap: 10px; }
        
        .matchup { background-color: var(--card-bg); border-radius: 4px; padding: 6px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 2px; font-size: 0.85rem; }
        .team { display: flex; justify-content: space-between; padding: 4px 6px; border-radius: 3px; }
        .team.winner { background-color: var(--winner-bg); font-weight: bold; }
        .seed { color: var(--text-muted); font-size: 0.75rem; margin-right: 5px; }

        .champion-box { padding: 20px; background-color: var(--card-bg); border: 2px dashed #ffd700; border-radius: 8px; }

        /* Matrix Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background-color: var(--bg-color); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); max-width: 95%; max-height: 90vh; overflow: auto; }
        
        table { border-collapse: collapse; margin: 20px auto; background: #0f172a; table-layout: fixed; width: 850px; }
        th, td { border: 1px solid var(--border-color); width: 50px; height: 45px; text-align: center; font-size: 0.75rem; position: relative; }
        th { background-color: var(--card-bg); color: var(--accent); font-weight: bold; }

        /* Matrix Tooltip */
        .matrix-cell { cursor: help; transition: filter 0.2s; }
        .matrix-cell:hover { filter: brightness(1.3); z-index: 2; }
        .matrix-cell .tooltip {
            visibility: hidden; width: 120px; background-color: #000; color: #fff;
            text-align: center; border-radius: 6px; padding: 8px; position: absolute;
            z-index: 100; bottom: 125%; left: 50%; transform: translateX(-50%);
            opacity: 0; transition: opacity 0.2s; pointer-events: none; border: 1px solid var(--accent);
            font-size: 0.7rem; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .matrix-cell:hover .tooltip { visibility: visible; opacity: 1; }
        
        .close-btn { float: right; cursor: pointer; color: var(--text-muted); font-size: 2rem; margin-top: -10px; }
    </style>
</head>
<body>

    <h1>🏀 The March Moggness Simulator 🏀</h1>
    
    <div id="score-banner">
        <div class="score-card">
            <span class="score-label">Mog Score:</span>
            <span id="total-score" class="score-value">0</span>
            <span id="percentile-wrapper" style="border-left: 1px solid var(--border-color); padding-left: 15px; text-align: left;">
                <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Percentile</div>
                <div id="percentile-value" style="font-size: 1.3rem; font-weight: bold;">0%</div>
            </span>
        </div>
    </div>

    <div class="controls">
        <button onclick="fetchAndRenderBracket()">Roll the Dice! 🎲</button>
        <button class="secondary" onclick="openMatrix()">📉 View Win-Rate Matrix</button>
    </div>

    <div class="tournament-board">
        <div id="left-half" class="side-bracket"></div>
        <div id="center-stage" class="center-stage"></div>
        <div id="right-half" class="side-bracket right-side"></div>
    </div>

    <div id="matrixModal" class="modal-overlay" onclick="closeMatrix()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeMatrix()">&times;</span>
            <h2 style="margin-top:0;">📊 Historical Win Rate Matrix</h2>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 20px;">Hover over cells to see game volume. Baseline logic used for rare matchups.</p>
            <div id="matrix-container">Loading...</div>
        </div>
    </div>

    <script>
        async function fetchAndRenderBracket() {
            const response = await fetch('/api/bracket');
            const data = await response.json();
            renderBracket(data);
        }

        function buildMatchupHTML(t1, t2) {
            return `
                <div class="matchup">
                    <div class="team ${t1.isWinner ? 'winner' : ''}">
                        <span><span class="seed">${t1.seed}</span> ${t1.name}</span>
                    </div>
                    <div class="team ${t2.isWinner ? 'winner' : ''}">
                        <span><span class="seed">${t2.seed}</span> ${t2.name}</span>
                    </div>
                </div>
            `;
        }

        function getPercentile(score) {
            const distribution = [
                { score: 1880, pct: 100.0 }, { score: 1840, pct: 99.9 }, { score: 1660, pct: 99.0 },
                { score: 1480, pct: 95.0 }, { score: 1240, pct: 90.0 }, { score: 920,  pct: 75.0 },
                { score: 760,  pct: 50.0 }, { score: 440,  pct: 25.0 }, { score: 280,  pct: 10.0 }, { score: 0, pct: 0.0 }
            ];
            for (let i = 0; i < distribution.length; i++) {
                if (score >= distribution[i].score) {
                    if (i === 0) return 100;
                    const high = distribution[i-1], low = distribution[i];
                    return (low.pct + ((score - low.score) / (high.score - low.score)) * (high.pct - low.pct)).toFixed(1);
                }
            }
            return 0;
        }

        function renderBracket(data) {
            const bracket = data.bracket, score = data.score_data.total_score;
            const percentile = getPercentile(score);
            
            document.getElementById('score-banner').style.display = 'block';
            document.getElementById('total-score').innerText = score;
            const pctVal = document.getElementById('percentile-value');
            pctVal.innerText = percentile + '%';
            pctVal.style.color = percentile >= 90 ? '#ffd700' : (percentile >= 75 ? '#2ecc71' : '#e94560');

            const leftHalf = document.getElementById('left-half'), rightHalf = document.getElementById('right-half'), centerStage = document.getElementById('center-stage');
            leftHalf.innerHTML = ''; rightHalf.innerHTML = ''; centerStage.innerHTML = '';

            for (let r = 0; r < 4; r++) {
                const games = bracket[r], half = games.length / 2;
                const lCol = document.createElement('div'), rCol = document.createElement('div');
                lCol.className = rCol.className = 'round';
                for (let i = 0; i < games.length; i += 2) {
                    const html = buildMatchupHTML(games[i], games[i+1]);
                    if (i < half) lCol.innerHTML += html; else rCol.innerHTML += html;
                }
                leftHalf.appendChild(lCol); rightHalf.appendChild(rCol);
            }

            const f4 = bracket[4], champ = bracket[5], winner = bracket[6][0];
            centerStage.innerHTML = `
                <div class="stage-title">Final Four</div>
                ${buildMatchupHTML(f4[0], f4[1])}${buildMatchupHTML(f4[2], f4[3])}
                <div class="stage-title" style="margin-top:20px;">Championship</div>
                ${buildMatchupHTML(champ[0], champ[1])}
                <div class="champion-box" style="margin-top:20px;">
                    <h2 style="color:#ffd700;margin:0;font-size:1rem;">🏆 CHAMPION 🏆</h2>
                    <div style="font-size:1.5rem;font-weight:bold;margin-top:5px;">${winner.name}</div>
                </div>`;
        }

        async function openMatrix() {
            document.getElementById('matrixModal').style.display = 'flex';
            const container = document.getElementById('matrix-container');
            if (container.innerHTML === 'Loading...') {
                const res = await fetch('/api/matrix');
                const data = await res.json();
                buildMatrixUI(data);
            }
        }

        function closeMatrix() { document.getElementById('matrixModal').style.display = 'none'; }

        function buildMatrixUI(data) {
            const winRates = data.win_rates || {}, counts = data.counts || {};
            let html = '<table><thead><tr><th>Seed</th>';
            for (let i = 1; i <= 16; i++) html += `<th>${i}</th>`;
            html += '</tr></thead><tbody>';

            for (let row = 1; row <= 16; row++) {
                html += `<tr><th>${row}</th>`;
                for (let col = 1; col <= 16; col++) {
                    const rS = row.toString(), cS = col.toString();
                    const winVal = (winRates[cS] && winRates[cS][rS]) ? winRates[cS][rS] : '-';
                    const countVal = (counts[cS] && counts[cS][rS]) ? counts[cS][rS] : 0;
                    
                    let prob = (winVal === '-') ? 0.50 + ((col - row) * 0.03) : Number(winVal);
                    let display = (winVal === '-') ? '-' : (prob * 100).toFixed(0) + '%';
                    let color = prob > 0.5 ? `rgba(46, 204, 113, ${prob})` : `rgba(233, 69, 96, ${1 - prob})`;

                    html += `<td class="matrix-cell" style="background-color:${color}">
                        ${display}<span class="tooltip">${countVal} Historical Games</span>
                    </td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('matrix-container').innerHTML = html;
        }

        fetchAndRenderBracket();
    </script>
</body>
</html>
